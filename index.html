<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Protected Access</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Courier New", monospace;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#000;
    color:#00ff00;
    overflow:hidden;
}

.container{
    width:360px;
    padding:30px;
    border:2px solid #00ff00;
    border-radius:10px;
    background:rgba(0,0,0,.9);
    box-shadow:0 0 15px #00ff00;
    text-align:center;
}

.lock{
    font-size:60px;
    margin-bottom:15px;
    color:#00ff00;
    text-shadow:0 0 15px #00ff00;
}

h2{
    margin-bottom:20px;
    text-transform:uppercase;
    letter-spacing:3px;
    text-shadow:0 0 8px #00ff00;
}

.input-box{
    position:relative;
    margin-bottom:15px;
}

input{
    width:100%;
    padding:12px;
    background:#000;
    color:#00ff00;
    border:2px solid #00ff00;
    border-radius:5px;
    outline:none;
    font-size:16px;
}

input::placeholder{
    color:#00aa00;
}

input:focus{
    box-shadow:0 0 10px #00ff00;
}

.toggle{
    position:absolute;
    right:12px;
    top:50%;
    transform:translateY(-50%);
    cursor:pointer;
    color:#00ff00;
}

button{
    width:100%;
    padding:12px;
    background:#000;
    color:#00ff00;
    border:2px solid #00ff00;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#00ff00;
    color:#000;
    box-shadow:0 0 15px #00ff00;
}

#error{
    margin-top:15px;
    color:#ff3333;
    font-weight:bold;
    text-shadow:0 0 5px red;
}

.container::before{
    content:"SYSTEM ACCESS";
    display:block;
    margin-bottom:20px;
    color:#00ff00;
    font-size:14px;
    letter-spacing:4px;
}

body::after{
    content:"";
    position:fixed;
    inset:0;
    background:repeating-linear-gradient(
        transparent 0px,
        rgba(0,255,0,.04) 2px,
        transparent 4px
    );
    pointer-events:none;
    animation:scan 6s linear infinite;
}

@keyframes scan{
    from{
        transform:translateY(-100%);
    }
    to{
        transform:translateY(100%);
    }
}
</style>
</head>

<body>

<div class="container">

<div class="lock">🖕</div>

<h2>Protected Page</h2>

<div class="input-box">
<input type="password" id="password" placeholder="Enter Password">
<span class="toggle" onclick="togglePassword()">👁️</span>
</div>

<button onclick="login()">Unlock</button>

<b><p id="error"></p></b>

</div>

<script>

const correctPassword = "Drexora2026";

function login(){

const pass = document.getElementById("password").value;

if(pass === correctPassword){
  sessionStorage.setItem("authenticated", "true");
window.location.href = "home.html";



}else{

document.getElementById("error").innerHTML="Wrong password!";

}

}

function togglePassword(){

const input=document.getElementById("password");

if(input.type==="password"){

input.type="text";

}else{

input.type="password";

}

}

document.getElementById("password").addEventListener("keypress",function(e){

if(e.key==="Enter"){

login();

}

});

</script>

</body>
                    </html>
